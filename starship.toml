# GRAY-BLUE-GREEN

format = """
[¯éÂ](#2E3440)\
$username$hostname\
[¯é░](fg:#2E3440 bg:#3B4252)\
$directory\
[¯é░](fg:#3B4252 bg:#434C5E)\
$git_branch$git_status\
[¯é░](fg:#434C5E bg:#5E81AC)\
$c$cpp$rust\
[¯é░](fg:#5E81AC bg:#88C0D0)\
$python\
[¯é░](fg:#88C0D0 bg:#A3BE8C)\
$time\
[¯é░](fg:#A3BE8C)
[ÔØ»](fg:#88C0D0) \
"""

[username]
show_always = true
style_user = "bg:#2E3440 fg:#D8DEE9"
style_root = "bg:#2E3440 fg:#BF616A"
format = '[´Çç $user ]($style)'

[hostname]
ssh_only = false
style = "bg:#2E3440 fg:#81A1C1"
format = '[¯®║ $hostname ]($style)'

[directory]
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
style = "bg:#3B4252 fg:#E5E9F0"
format = "[ ´ü╝ $path ]($style)"

[git_branch]
style = "bg:#434C5E fg:#EBCB8B"
format = '[ ¯£Ñ $branch ]($style)'

[git_status]
style = "bg:#434C5E fg:#D08770"
format = '[$all_status$ahead_behind ]($style)'

[c]
style = "bg:#5E81AC fg:#ECEFF4"
format = '[ ¯İŞ $version ]($style)'

[cpp]
style = "bg:#5E81AC fg:#ECEFF4"
format = '[ ¯Öå $version ]($style)'

[rust]
style = "bg:#5E81AC fg:#ECEFF4"
format = '[ ­şĞÇ $version ]($style)'

[python]
style = "bg:#88C0D0 fg:#2E3440"
format = '[ (\($virtualenv\)) ¯£╝ ($version) ]($style)'

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bg:#A3BE8C fg:#2E3440"
format = '[ ´É║ $time ]($style)'

