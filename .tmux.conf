# =================================
# 宖耳 THEME (clean nord/neon hybrid)
# =================================

set -g status-bg "#2E3440"
set -g status-fg "#D8DEE9"

set -g pane-border-style fg="#434C5E"
set -g pane-active-border-style fg="#88C0D0"

set -g message-style fg="#2E3440",bg="#88C0D0"
set -g message-command-style fg="#2E3440",bg="#88C0D0"
set -g mode-style fg="#2E3440",bg="#A3BE8C"

set -g status-left-length 20
set -g status-left '#[fg=#88C0D0,bg=#2E3440]蟬ｶ#[fg=#2E3440,bg=#88C0D0] #S #[fg=#88C0D0,bg=#2E3440]蟬ｰ #[default]'
set -g status-right-length 80
set -g status-right '#[fg=#88C0D0,bg=#2E3440]蟬ｲ#[fg=#2E3440,bg=#88C0D0] 諟ｺ #(hostname -s) 雩ｳ %d-%b-%Y 鞺ｺ %H:%M #[fg=#88C0D0,bg=#2E3440]蟬ｴ#[default]'


